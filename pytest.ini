# Pass 5c: pytest config.
#
# Tests live under tests/ and import the bin/*.py scripts via the
# conftest.py sys.path hook. Markers:
#
#   @pytest.mark.slow      — full-pipeline tests (skipped by default;
#                            run with `pytest -m slow`)
#
# By default the slow tests are excluded so `pytest` is fast (<1s).
# Override with `pytest -m slow` to run them, or `pytest -m "not slow"`
# to be explicit.

[pytest]
testpaths = tests
addopts = -ra --strict-markers -m "not slow"
markers =
    slow: full-pipeline tests that read CSVs / MinIO; run with -m slow